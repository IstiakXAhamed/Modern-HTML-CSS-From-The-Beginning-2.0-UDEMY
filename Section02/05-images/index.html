<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>HTML & CSS Sandbox - Images</h1>

    <h2>Image With a Relative Path</h2>
    <img src="images/landscape.jpg" alt="A flower" />

    <!-- <h2>Image With an Absolute Path</h2> -->
    <!-- <h2>Image With an Absolute Path</h2>
    <img src="https://images.unsplash.com/photo-1506744038136-462
 -->

    <!-- <h2>Image With a Figure and Figcaption</h2>   -->
    <h2>Image With a Figure and Figcaption</h2>
    <figure>
      <img
        src="images/landscape.jpg"
        alt="landscape"
        height="300"
        width="400"
      />

      <figcaption>This is a beautiful landscape image.</figcaption>
    </figure>
  </body>
</html>
