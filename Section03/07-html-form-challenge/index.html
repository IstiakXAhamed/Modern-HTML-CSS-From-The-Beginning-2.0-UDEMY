<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Html Forms</title>
  </head>

  <body>
    <h2>Apartment Search</h2>
    <form action="#" method="post">
      <div>
        <label for="location">location</label>
        <input type="text" name="location " id="location" />
      </div>

      <div>
        <label for="monthlyPrice">Monthly Price:</label>
        <input
          type="range"
          name="monthlyPrice"
          id="monthlyPrice"
          min="0"
          max="100"
        />
      </div>
      <div>
        <label for="bedrooms">Number of Bedrooms </label>
        <input type="number" name="bedrooms" id="bedrooms " />
      </div>

      <div>
        <label for="bathrooms">Number of bathrooms</label>
        <input type="number" name="bathrooms" id="bathrooms" />
      </div>

      <div>
        <label for="pet">Pets Allowed: </label>
        Yes
        <input type="checkbox" id="pet" value="Yes" />
      </div>

      <div>
        <label for="dateAvailable">Date Available: </label>
        <input type="date" name="dateAvailable" id="dateAvailable" />
      </div>

      <div>
        <input type="submit" id="submit" />
      </div>
    </form>
  </body>
</html>
